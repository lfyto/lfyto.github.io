<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的HTML作业集</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', 'Segoe UI', sans-serif;
            background: 
                linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)),
                url('background-photo.jpg') center/cover fixed;
            min-height: 100vh;
            color: #e0e0e0;
            overflow-x: hidden;
            position: relative;
        }

        .stars-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .star {
            position: absolute;
            background-color: rgba(255, 255, 255, 0.9);
            border-radius: 50%;
            pointer-events: none;
        }

        .star.small {
            width: 1px;
            height: 1px;
            box-shadow: 0 0 2px rgba(255, 255, 255, 0.7);
        }

        .star.medium {
            width: 2px;
            height: 2px;
            box-shadow: 0 0 3px rgba(255, 255, 255, 0.8);
        }

        .star.large {
            width: 3px;
            height: 3px;
            box-shadow: 0 0 4px rgba(255, 255, 255, 0.9);
        }

        .student-id {
            position: fixed;
            top: 20px;
            left: 20px;
            font-size: 14px;
            color: #bbb;
            padding: 8px 12px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 10;
            backdrop-filter: blur(5px);
        }

        .text-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2;
            pointer-events: none;
        }

        .background-text {
            text-align: center;
            width: 100%;
            padding: 20px;
        }

        .background-english {
            font-size: 6rem;
            font-weight: 300;
            line-height: 1.2;
            letter-spacing: 2px;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.8);
            animation: englishFlow 15s ease-in-out infinite alternate;
            background: linear-gradient(45deg, 
                rgba(255, 255, 255, 0.9) 0%, 
                rgba(255, 255, 255, 0.7) 50%, 
                rgba(255, 255, 255, 0.9) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .background-chinese {
            font-size: 3rem;
            font-weight: 400;
            line-height: 1.5;
            margin-top: 20px;
            animation: chineseFlow 12s ease-in-out infinite alternate;
            text-shadow: 2px 2px 6px rgba(0, 0, 0, 0.7);
            background: linear-gradient(45deg, 
                rgba(255, 255, 255, 0.8) 0%, 
                rgba(255, 255, 255, 0.6) 50%, 
                rgba(255, 255, 255, 0.8) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        /* 涟漪扩散效果 */
        .ripple-style {
            display: inline-block;
            position: relative;
        }

        .ripple-style .quan, 
        .ripple-style .li, 
        .ripple-style .yi, 
        .ripple-style .zhi {
            display: inline-block;
            position: relative;
            color: rgba(255, 215, 0, 0.9);
            animation: rippleEffect 3s ease-in-out infinite;
        }

        .ripple-style .quan { animation-delay: 0s; }
        .ripple-style .li { animation-delay: 0.3s; }
        .ripple-style .yi { animation-delay: 0.6s; }
        .ripple-style .zhi { animation-delay: 0.9s; }

        @keyframes rippleEffect {
            0%, 100% {
                transform: scale(1);
                opacity: 0.8;
                text-shadow: 0 0 0 rgba(255, 215, 0, 0);
            }
            50% {
                transform: scale(1.2);
                opacity: 1;
                text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
            }
        }

        .hover-area {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 60px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            z-index: 5;
            cursor: pointer;
            border-radius: 30px;
            transition: all 0.5s ease;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .hover-area:hover {
            background: rgba(0, 0, 0, 0.7);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.2);
            transform: translateX(-50%) scale(1.05);
        }

        .hover-area:hover .hover-text {
            opacity: 1;
            color: #fff;
        }

        .hover-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255, 255, 255, 0.8);
            font-size: 16px;
            opacity: 0.8;
            transition: all 0.5s ease;
            pointer-events: none;
        }

        .nav-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 700px;
            max-height: 80vh;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            z-index: 100;
            overflow: hidden;
            opacity: 0;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .nav-popup.active {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        .popup-header {
            padding: 20px 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.5);
        }

        .popup-title {
            font-size: 24px;
            color: #fff;
            font-weight: 500;
        }

        .close-popup {
            background: none;
            border: none;
            color: #bbb;
            font-size: 20px;
            cursor: pointer;
            padding: 5px;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .close-popup:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .popup-content {
            padding: 30px;
            max-height: 60vh;
            overflow-y: auto;
        }

        .homework-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .homework-card {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            cursor: pointer;
            text-align: center;
            backdrop-filter: blur(5px);
            position: relative;
        }

        .homework-card:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }

        .homework-card a {
            color: #ccc;
            text-decoration: none;
            font-size: 16px;
            display: block;
        }

        .homework-card a:hover {
            color: #ffd700;
        }

        .folder-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255, 215, 0, 0.2);
            color: #ffd700;
            font-size: 12px;
            padding: 2px 8px;
            border-radius: 12px;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }

        .file-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(100, 200, 255, 0.2);
            color: #64c8ff;
            font-size: 12px;
            padding: 2px 8px;
            border-radius: 12px;
            border: 1px solid rgba(100, 200, 255, 0.3);
        }

        .instructions {
            margin-top: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
        }

        .instructions h3 {
            color: #fff;
            margin-bottom: 15px;
            font-size: 18px;
        }

        .instructions h4 {
            color: #ddd;
            margin: 20px 0 10px 0;
            font-size: 16px;
        }

        .instructions p {
            color: #bbb;
            line-height: 1.6;
            margin-bottom: 10px;
        }

        .instructions code {
            background: rgba(255, 255, 255, 0.1);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            color: #ffd700;
        }

        .instructions ol, .instructions ul {
            margin-left: 20px;
            color: #bbb;
            line-height: 1.6;
        }

        .instructions li {
            margin-bottom: 8px;
        }

        .structure-tree {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 6px;
            padding: 15px;
            margin: 10px 0;
            font-family: 'Courier New', monospace;
            color: #64c8ff;
        }

        .popup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            z-index: 99;
            opacity: 0;
            visibility: hidden;
            transition: all 0.5s ease;
        }

        .popup-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .mouse-trail {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
        }

        .trail-dot {
            position: absolute;
            width: 6px;
            height: 6px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            pointer-events: none;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
            transition: transform 0.2s ease-out, opacity 1s ease-out;
        }

        @keyframes englishFlow {
            0% {
                transform: translateY(0) scale(1);
                filter: blur(2px);
            }
            25% {
                transform: translateY(-10px) scale(1.02);
                filter: blur(1px);
            }
            50% {
                transform: translateY(5px) scale(0.98);
                filter: blur(0.5px);
            }
            75% {
                transform: translateY(-5px) scale(1.01);
                filter: blur(1.5px);
            }
            100% {
                transform: translateY(0) scale(1);
                filter: blur(2px);
            }
        }

        @keyframes chineseFlow {
            0% {
                transform: translateX(0) scale(1);
                filter: blur(1.5px);
            }
            33% {
                transform: translateX(10px) scale(0.99);
                filter: blur(0.5px);
            }
            66% {
                transform: translateX(-10px) scale(1.01);
                filter: blur(1px);
            }
            100% {
                transform: translateX(0) scale(1);
                filter: blur(1.5px);
            }
        }

        @media (max-width: 1024px) {
            .background-english {
                font-size: 5rem;
            }
            
            .background-chinese {
                font-size: 2.5rem;
            }
            
            .nav-popup {
                width: 80%;
            }
        }

        @media (max-width: 768px) {
            .background-english {
                font-size: 3rem;
            }
            
            .background-chinese {
                font-size: 1.5rem;
            }
            
            .nav-popup {
                width: 90%;
                max-height: 70vh;
            }
            
            .homework-list {
                grid-template-columns: 1fr;
            }
            
            .student-id {
                top: 10px;
                left: 10px;
                font-size: 12px;
                padding: 6px 10px;
            }
        }
    </style>

    <script>
        // 星点系统
        class EnhancedStarSystem {
            constructor(container) {
                this.container = container;
                this.totalStarCount = 150;
                this.activeStars = 0;
                this.starPool = [];
                this.isRunning = true;
                this.maxConcurrentStars = 30;
                this.starGenerationInterval = null;
            }
            
            init() {
                for (let i = 0; i < this.totalStarCount; i++) {
                    const star = document.createElement('div');
                    star.style.position = 'absolute';
                    star.style.borderRadius = '50%';
                    star.style.pointerEvents = 'none';
                    star.style.opacity = '0';
                    star.style.transform = 'scale(0)';
                    
                    this.container.appendChild(star);
                    this.starPool.push({
                        element: star,
                        active: false,
                        size: null,
                        x: 0,
                        y: 0
                    });
                }
                
                this.startStarGeneration();
                
                this.starGenerationInterval = setInterval(() => {
                    this.generateBatchOfStars();
                }, 100);
            }
            
            getRandomPosition() {
                return {
                    x: Math.random() * 100,
                    y: Math.random() * 100
                };
            }
            
            getRandomSize() {
                const rand = Math.random();
                if (rand < 0.7) return 'small';
                if (rand < 0.9) return 'medium';
                return 'large';
            }
            
            getSizeProperties(size) {
                const sizes = {
                    small: { width: 1, height: 1, boxShadow: '0 0 2px rgba(255, 255, 255, 0.7)' },
                    medium: { width: 2, height: 2, boxShadow: '0 0 3px rgba(255, 255, 255, 0.8)' },
                    large: { width: 3, height: 3, boxShadow: '0 0 4px rgba(255, 255, 255, 0.9)' }
                };
                return sizes[size];
            }
            
            activateStar(star) {
                const size = this.getRandomSize();
                const pos = this.getRandomPosition();
                const sizeProps = this.getSizeProperties(size);
                
                const fadeInDuration = 500 + Math.random() * 800;
                const stayDuration = 800 + Math.random() * 1200;
                const fadeOutDuration = 400 + Math.random() * 600;
                const delay = Math.random() * 300;
                
                star.element.className = `star ${size}`;
                star.element.style.left = `${pos.x}%`;
                star.element.style.top = `${pos.y}%`;
                star.element.style.width = `${sizeProps.width}px`;
                star.element.style.height = `${sizeProps.height}px`;
                star.element.style.boxShadow = sizeProps.boxShadow;
                star.element.style.background = 'rgba(255, 255, 255, 0.9)';
                
                star.active = true;
                star.size = size;
                star.x = pos.x;
                star.y = pos.y;
                this.activeStars++;
                
                const sequence = [
                    { opacity: 0, transform: 'scale(0)', offset: 0 },
                    { opacity: 1, transform: 'scale(1)', offset: 0.4 },
                    { opacity: 1, transform: 'scale(1.1)', offset: 0.6 },
                    { opacity: 0.8, transform: 'scale(1)', offset: 0.8 },
                    { opacity: 0, transform: 'scale(0)', offset: 1 }
                ];
                
                const duration = fadeInDuration + stayDuration + fadeOutDuration;
                const keyframeTimes = [
                    0,
                    fadeInDuration / duration,
                    (fadeInDuration + stayDuration * 0.4) / duration,
                    (fadeInDuration + stayDuration * 0.8) / duration,
                    1
                ];
                
                const adjustedSequence = sequence.map((frame, index) => ({
                    ...frame,
                    offset: keyframeTimes[index]
                }));
                
                setTimeout(() => {
                    if (!this.isRunning) return;
                    
                    const animation = star.element.animate(adjustedSequence, {
                        duration: duration,
                        easing: 'cubic-bezier(0.4, 0, 0.2, 1)'
                    });
                    
                    animation.onfinish = () => {
                        star.active = false;
                        star.element.style.opacity = '0';
                        star.element.style.transform = 'scale(0)';
                        this.activeStars--;
                        
                        if (this.isRunning) {
                            const nextDelay = 300 + Math.random() * 1500;
                            setTimeout(() => this.activateStar(star), nextDelay);
                        }
                    };
                }, delay);
            }
            
            generateBatchOfStars() {
                if (!this.isRunning) return;
                
                if (this.activeStars < this.maxConcurrentStars) {
                    const neededStars = Math.min(5, this.maxConcurrentStars - this.activeStars);
                    
                    for (let i = 0; i < neededStars; i++) {
                        const availableStars = this.starPool.filter(star => !star.active);
                        if (availableStars.length > 0) {
                            const randomStar = availableStars[Math.floor(Math.random() * availableStars.length)];
                            this.activateStar(randomStar);
                        } else {
                            break;
                        }
                    }
                }
            }
            
            startStarGeneration() {
                const initialActiveStars = Math.min(15, this.maxConcurrentStars);
                
                for (let i = 0; i < initialActiveStars; i++) {
                    setTimeout(() => {
                        const availableStars = this.starPool.filter(star => !star.active);
                        if (availableStars.length > 0) {
                            const randomStar = availableStars[Math.floor(Math.random() * availableStars.length)];
                            this.activateStar(randomStar);
                        }
                    }, i * 100);
                }
            }
            
            stop() {
                this.isRunning = false;
                if (this.starGenerationInterval) {
                    clearInterval(this.starGenerationInterval);
                }
            }
        }
        
        // 鼠标轨迹效果
        class MouseTrailEffect {
            constructor(container) {
                this.container = container;
                this.trailLength = 20;
                this.trailPoints = [];
                this.trailDots = [];
                this.lastMouseX = 0;
                this.lastMouseY = 0;
                this.trailAnimation = null;
                
                this.init();
            }
            
            init() {
                for (let i = 0; i < this.trailLength; i++) {
                    const dot = document.createElement('div');
                    dot.className = 'trail-dot';
                    dot.style.opacity = '0';
                    dot.style.transform = 'scale(0)';
                    this.container.appendChild(dot);
                    this.trailDots.push(dot);
                }
                
                window.addEventListener('mousemove', (e) => this.onMouseMove(e));
                this.startAnimation();
            }
            
            onMouseMove(e) {
                this.lastMouseX = e.clientX;
                this.lastMouseY = e.clientY;
                
                this.trailPoints.unshift({ x: e.clientX, y: e.clientY });
                if (this.trailPoints.length > this.trailLength) {
                    this.trailPoints.pop();
                }
            }
            
            startAnimation() {
                const animate = () => {
                    for (let i = 0; i < this.trailDots.length; i++) {
                        const dot = this.trailDots[i];
                        if (i < this.trailPoints.length) {
                            const point = this.trailPoints[i];
                            const scale = 1 - (i / this.trailLength) * 0.7;
                            const opacity = 1 - (i / this.trailLength) * 0.9;
                            
                            dot.style.left = `${point.x}px`;
                            dot.style.top = `${point.y}px`;
                            dot.style.opacity = opacity;
                            dot.style.transform = `scale(${scale})`;
                            
                            const colorValue = Math.floor(255 - (i / this.trailLength) * 100);
                            dot.style.background = `rgba(${colorValue}, ${colorValue}, 255, 0.7)`;
                        } else {
                            dot.style.opacity = '0';
                        }
                    }
                    
                    this.trailAnimation = requestAnimationFrame(animate);
                };
                
                animate();
            }
            
            stop() {
                if (this.trailAnimation) {
                    cancelAnimationFrame(this.trailAnimation);
                }
            }
        }
        
        // 增强的HTML作业管理器
        class EnhancedHomeworkManager {
            constructor() {
                this.popup = document.getElementById('navPopup');
                this.overlay = document.getElementById('popupOverlay');
                this.closeBtn = document.getElementById('closePopup');
                this.homeworkList = document.getElementById('homeworkList');
                this.isOpen = false;
                
                this.init();
            }
            
            init() {
                this.loadHomeworkData();
                this.setupEventListeners();
            }
            
            // HTML作业数据 - 支持单文件和多文件作业
            //
            //
            //
            //在这里创建作业按钮
            //
            //
            //
            //
            loadHomeworkData() {
                const homeworks = [
                    {
                        name: "练习一：十四届全国人大四次会议新闻报道", 
                        url: "homeworks/practice_one.html", 
                        type: "single"
                    },
                    
                ];
                
                this.renderHomeworks(homeworks);
            }
            
            renderHomeworks(homeworks) {
                this.homeworkList.innerHTML = '';
                
                if (homeworks.length === 0) {
                    this.homeworkList.innerHTML = '<p style="color: #888; text-align: center; grid-column: 1 / -1;">还没有添加HTML作业，请查看下方添加方法</p>';
                    return;
                }
                
                homeworks.forEach(homework => {
                    const card = this.createHomeworkCard(homework);
                    this.homeworkList.appendChild(card);
                });
            }
            
            createHomeworkCard(homework) {
                const card = document.createElement('div');
                card.className = 'homework-card';
                
                // 根据作业类型添加徽章
                const badge = document.createElement('span');
                badge.className = homework.type === 'folder' ? 'folder-badge' : 'file-badge';
                badge.textContent = homework.type === 'folder' ? '文件夹' : '单文件';
                card.appendChild(badge);
                
                const link = document.createElement('a');
                link.href = homework.url;
                link.textContent = homework.name;
                link.target = "_blank";
                link.title = homework.type === 'folder' ? '多文件作业（包含CSS、HTML、图片等）' : '单文件作业';
                
                card.appendChild(link);
                
                // 添加点击事件
                card.addEventListener('click', (e) => {
                    if (!e.target.matches('a')) {
                        window.open(homework.url, '_blank');
                    }
                });
                
                return card;
            }
            
            // 添加新作业的方法（增强版）
            addNewHomework(name, url, type = 'single') {
                const newHomework = { 
                    name: name, 
                    url: url, 
                    type: type 
                };
                
                // 获取当前作业列表
                const homeworks = this.getCurrentHomeworks();
                
                // 添加新作业
                homeworks.push(newHomework);
                
                // 重新渲染列表
                this.renderHomeworks(homeworks);
                
                // 保存到localStorage
                this.saveToLocalStorage(homeworks);
                
                console.log(`已添加作业: ${name} (类型: ${type})`);
            }
            
            getCurrentHomeworks() {
                const cards = this.homeworkList.querySelectorAll('.homework-card');
                const homeworks = [];
                
                cards.forEach(card => {
                    const link = card.querySelector('a');
                    const badge = card.querySelector('.folder-badge, .file-badge');
                    
                    if (link) {
                        const type = badge && badge.classList.contains('folder-badge') ? 'folder' : 'single';
                        homeworks.push({
                            name: link.textContent,
                            url: link.href,
                            type: type
                        });
                    }
                });
                
                return homeworks;
            }
            
            saveToLocalStorage(homeworks) {
                try {
                    localStorage.setItem('myHomeworks', JSON.stringify(homeworks));
                } catch (e) {
                    console.log('无法保存到本地存储:', e);
                }
            }
            
            loadFromLocalStorage() {
                try {
                    const savedHomeworks = localStorage.getItem('myHomeworks');
                    if (savedHomeworks) {
                        return JSON.parse(savedHomeworks);
                    }
                } catch (e) {
                    console.log('无法从本地存储加载:', e);
                }
                return null;
            }
            
            setupEventListeners() {
                this.closeBtn.addEventListener('click', () => this.close());
                this.overlay.addEventListener('click', () => this.close());
                
                document.addEventListener('keydown', (e) => {
                    if (e.key === 'Escape' && this.isOpen) {
                        this.close();
                    }
                });
            }
            
            open() {
                this.popup.classList.add('active');
                this.overlay.classList.add('active');
                this.isOpen = true;
                document.body.style.overflow = 'hidden';
            }
            
            close() {
                this.popup.classList.remove('active');
                this.overlay.classList.remove('active');
                this.isOpen = false;
                document.body.style.overflow = '';
            }
            
            toggle() {
                if (this.isOpen) {
                    this.close();
                } else {
                    this.open();
                }
            }
        }
        
        // 背景文字效果
        class BackgroundTextEffect {
            constructor(englishElement, chineseElement) {
                this.englishElement = englishElement;
                this.chineseElement = chineseElement;
                this.init();
            }
            
            init() {
                window.addEventListener('mousemove', (e) => this.onMouseMove(e));
            }
            
            onMouseMove(e) {
                const windowWidth = window.innerWidth;
                const windowHeight = window.innerHeight;
                const mouseX = e.clientX;
                const mouseY = e.clientY;
                
                const moveX = ((mouseX / windowWidth) - 0.5) * 30;
                const moveY = ((mouseY / windowHeight) - 0.5) * 30;
                
                this.englishElement.style.transform = `translate(${moveX}px, ${moveY}px)`;
                this.chineseElement.style.transform = `translate(${-moveX * 0.5}px, ${-moveY * 0.5}px)`;
            }
        }
        
        // 页面加载完成后初始化所有组件
        document.addEventListener('DOMContentLoaded', function() {
            console.log('增强版HTML作业管理器页面加载完成');
            
            // 初始化星点系统
            const starContainer = document.getElementById('starsContainer');
            const starSystem = new EnhancedStarSystem(starContainer);
            starSystem.init();
            
            // 初始化鼠标轨迹效果
            const mouseTrailContainer = document.getElementById('mouseTrail');
            const mouseTrail = new MouseTrailEffect(mouseTrailContainer);
            
            // 初始化背景文字效果
            const backgroundEnglish = document.getElementById('backgroundEnglish');
            const backgroundChinese = document.getElementById('backgroundChinese');
            const textBackgroundEffect = new BackgroundTextEffect(backgroundEnglish, backgroundChinese);
            
            // 初始化增强版HTML作业管理器
            const homeworkManager = new EnhancedHomeworkManager();
            const hoverArea = document.getElementById('hoverArea');
            
            // 悬停区域交互
            let hoverTimer = null;
            let hoverActive = false;
            
            hoverArea.addEventListener('mouseenter', () => {
                if (!hoverActive) {
                    hoverActive = true;
                    hoverTimer = setTimeout(() => {
                        homeworkManager.open();
                    }, 500);
                }
            });
            
            hoverArea.addEventListener('mouseleave', () => {
                if (hoverActive && !homeworkManager.isOpen) {
                    clearTimeout(hoverTimer);
                    hoverActive = false;
                }
            });
            
            hoverArea.addEventListener('click', (e) => {
                e.stopPropagation();
                homeworkManager.toggle();
            });
            
            // 在window对象上暴露增强的addHomework方法
            window.addHomework = function(name, url, type = 'single') {
                homeworkManager.addNewHomework(name, url, type);
            };
            
            
            
            console.log('增强版HTML作业管理器已初始化');
            console.log('添加新作业的方法: addHomework("作业名称", "文件路径.html", "类型")');
            console.log('类型: "single" 表示单文件作业, "folder" 表示多文件作业');
            
            // 页面卸载时清理资源
            window.addEventListener('beforeunload', function() {
                starSystem.stop();
                mouseTrail.stop();
            });
        });
    </script>
</body>
</html>
